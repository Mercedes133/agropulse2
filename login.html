<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pac Minner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f9f7f6;
        }
        .brand-brown { color: #8d5524; }
        .brand-brown-bg { background: #8d5524; }
        .brand-dark { color: #22223b; }
        .brand-dark-bg { background: #22223b; }
        .tab-active {
            border-bottom: 3px solid #8d5524;
            color: #8d5524;
        }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <!-- Navigation Bar -->
    <nav class="glass-nav fixed top-0 w-full z-50 border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <!-- Brand Header -->
                <header class="w-full flex flex-col items-center pt-8 pb-4">
                    <img src="/public/images/logo.png" alt="Pac Minner Logo" class="w-16 h-16 rounded-full shadow mb-2" onerror="this.style.display='none'">
                    <h1 class="font-bold text-2xl brand-brown tracking-tight">Pac Minner</h1>
                    <span class="text-xs text-gray-500 mt-1">pacminnerinvest.online</span>
                </header>
    <!-- Login Card -->
    <main class="flex flex-col items-center justify-center min-h-screen pt-2 pb-8 px-2">
        <div class="bg-white rounded-2xl shadow-lg p-6 w-full max-w-sm mt-2">
            <h2 class="text-xl font-bold text-center mb-4 brand-dark">Welcome Back</h2>
            <p class="text-center text-gray-500 mb-6 text-sm">Login to manage your investments</p>
            <!-- Tabs -->
            <div class="flex mb-6 border-b border-gray-200">
                <button id="tab-phone" class="flex-1 py-2 text-center font-semibold tab-active" type="button" onclick="showTab('phone')">Phone Number</button>
                <button id="tab-email" class="flex-1 py-2 text-center font-semibold text-gray-400" type="button" onclick="showTab('email')">Email Address</button>
            </div>
            <!-- Phone Login -->
            <form id="login-form-phone" class="tab-content" action="/api/login" method="post">
                <div class="mb-4">
                    <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
                    <div class="flex items-center border border-gray-300 rounded-md px-2">
                        <span class="text-gray-500 pr-2">+233</span>
                        <input type="tel" id="phone" name="phone" required placeholder="054xxxxxxx" class="flex-1 py-2 focus:outline-none">
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password-phone" class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password-phone" name="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-brand-brown focus:border-brand-brown">
                </div>
                <div class="mb-4 flex items-center">
                    <input type="checkbox" id="remember-phone" name="remember" class="mr-2">
                    <label for="remember-phone" class="text-sm text-gray-600">Remember me</label>
                </div>
                <div class="mb-4">
                    <div class="g-recaptcha" data-sitekey="YOUR_RECAPTCHA_SITE_KEY"></div>
                </div>
                <button type="submit" class="w-full bg-[#8d5524] hover:bg-[#7a471e] text-white font-bold py-2 px-4 rounded-full transition">Log In</button>
                <div class="flex justify-between mt-4">
                    <a href="#" class="text-xs text-gray-500 hover:underline">Forgot Password?</a>
                </div>
            </form>
            <!-- Email Login -->
            <form id="login-form-email" class="tab-content hidden" action="/api/login" method="post">
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-brand-brown focus:border-brand-brown">
                </div>
                <div class="mb-4">
                    <label for="password-email" class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password-email" name="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-brand-brown focus:border-brand-brown">
                </div>
                <div class="mb-4 flex items-center">
                    <input type="checkbox" id="remember-email" name="remember" class="mr-2">
                    <label for="remember-email" class="text-sm text-gray-600">Remember me</label>
                </div>
                <div class="mb-4">
                    <div class="g-recaptcha" data-sitekey="YOUR_RECAPTCHA_SITE_KEY"></div>
                </div>
                <button type="submit" class="w-full bg-[#8d5524] hover:bg-[#7a471e] text-white font-bold py-2 px-4 rounded-full transition">Log In</button>
                <div class="flex justify-between mt-4">
                    <a href="#" class="text-xs text-gray-500 hover:underline">Forgot Password?</a>
                </div>
            </form>
            <p id="form-message" class="hidden text-sm mb-4"></p>
            <div class="text-center mt-6">
                <span class="text-gray-600">Don't have an account?</span>
                <a href="/signup" class="brand-brown hover:underline font-semibold">Sign Up</a>
            </div>
        </div>
    </main>
    <script>
        function showTab(tab) {
            document.getElementById('tab-phone').classList.remove('tab-active');
            document.getElementById('tab-email').classList.remove('tab-active');
            document.getElementById('login-form-phone').classList.add('hidden');
            document.getElementById('login-form-email').classList.add('hidden');
            if (tab === 'phone') {
                document.getElementById('tab-phone').classList.add('tab-active');
                document.getElementById('login-form-phone').classList.remove('hidden');
            } else {
                document.getElementById('tab-email').classList.add('tab-active');
                document.getElementById('login-form-email').classList.remove('hidden');
            }
        }
    </script>
    <!-- Google reCAPTCHA script -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <!-- Navigation JS Logic -->
    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
            } else {
                menu.classList.add('hidden');
            }
        }

        async function checkAlreadyLoggedIn() {
            try {
                const response = await fetch('/api/me');
                const data = await response.json();
                if (data.authenticated) {
                    window.location.href = '/dashboard';
                }
            } catch (error) {
                console.error('Session check failed:', error);
            }
        }

        function showMessage(message, isSuccess) {
            const msg = document.getElementById('form-message');
            msg.textContent = message;
            msg.className = `text-sm mb-4 ${isSuccess ? 'text-green-600' : 'text-red-600'}`;
        }

        const MAX_ATTEMPTS = 5;
        let failedAttempts = 0;

        function setSubmitButtonState(isBusy) {
            const submitBtn = document.getElementById('login-submit-btn');
            if (!submitBtn) return;
            submitBtn.disabled = isBusy;
            submitBtn.textContent = isBusy ? 'Checking...' : 'Login';
        }

        document.getElementById('email').addEventListener('input', () => showMessage('', false));
        document.getElementById('password').addEventListener('input', () => showMessage('', false));

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                setSubmitButtonState(true);

                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                let data = {};
                try {
                    data = await response.json();
                } catch (error) {
                    data = { success: false, message: 'Unexpected server response' };
                }

                if (data.success) {
                    failedAttempts = 0;
                    showMessage('Login successful. Redirecting...', true);
                    window.setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 600);
                    return;
                }

                if (response.status === 429) {
                    showMessage(data.message || 'Too many attempts. Please wait and try again.', false);
                    return;
                }

                failedAttempts += 1;
                const attemptsLeft = Math.max(0, MAX_ATTEMPTS - failedAttempts);
                const baseMessage = data.message || 'Login failed';
                const hint = attemptsLeft > 0
                    ? ` You can still try ${attemptsLeft} more time${attemptsLeft === 1 ? '' : 's'}.`
                    : ' Please wait 10 minutes, then try again.';
                showMessage(baseMessage + hint, false);
            } catch (error) {
                console.error('Error:', error);
                showMessage('Login failed. Please ensure the server is running.', false);
            } finally {
                setSubmitButtonState(false);
            }
        });

        checkAlreadyLoggedIn();
    </script>
</body>
</html>

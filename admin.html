<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Agro Pluse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <div class="min-h-screen bg-gray-100">
        <header class="bg-blue-800 text-white p-4">
            <h1 class="text-2xl font-bold">Agro Pluse Admin Panel</h1>
        </header>

        <main class="p-6">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-bold mb-4">Users Overview</h2>
                <button onclick="loadUsersOverview()" class="bg-blue-800 text-white px-4 py-2 rounded mb-4">Refresh</button>
                <div id="users-overview-list" class="space-y-4">
                    <!-- Users overview will be listed here -->
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-bold mb-4">Pending Signups</h2>
                <button onclick="loadPendingUsers()" class="bg-blue-800 text-white px-4 py-2 rounded mb-4">Refresh</button>
                <div id="pending-list" class="space-y-4">
                    <!-- Pending users will be listed here -->
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 mt-6">
                <h2 class="text-xl font-bold mb-4">Pending Deposits</h2>
                <button onclick="loadPendingDeposits()" class="bg-blue-800 text-white px-4 py-2 rounded mb-4">Refresh</button>
                <div id="pending-deposits-list" class="space-y-4">
                    <!-- Pending deposits will be listed here -->
                </div>
            </div>
        </main>
    </div>

    <script>
        function formatCurrency(amount) {
            return `GH₵ ${Number(amount || 0).toFixed(2)}`;
        }

        function formatJoinedDuration(dateValue) {
            if (!dateValue) return 'Unknown';
            const joinedDate = new Date(dateValue);
            if (Number.isNaN(joinedDate.getTime())) return 'Unknown';

            const now = new Date();
            const diffMs = now - joinedDate;
            const diffDays = Math.max(0, Math.floor(diffMs / (1000 * 60 * 60 * 24)));

            if (diffDays < 1) return 'Today';
            if (diffDays === 1) return '1 day';
            if (diffDays < 30) return `${diffDays} days`;

            const diffMonths = Math.floor(diffDays / 30);
            if (diffMonths === 1) return '1 month';
            if (diffMonths < 12) return `${diffMonths} months`;

            const diffYears = Math.floor(diffMonths / 12);
            return diffYears === 1 ? '1 year' : `${diffYears} years`;
        }

        function loadUsersOverview() {
            fetch('/api/admin/users-overview')
            .then(async (response) => {
                if (!response.ok) {
                    throw new Error(`Failed to load users overview (HTTP ${response.status})`);
                }
                return response.json();
            })
            .then(data => {
                const list = document.getElementById('users-overview-list');
                list.innerHTML = '';

                const users = data.users || [];
                if (users.length === 0) {
                    list.innerHTML = '<p class="text-gray-500">No users found.</p>';
                    return;
                }

                users.forEach(user => {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'border p-4 rounded';
                    const joinedOn = user.created_at ? new Date(user.created_at).toLocaleString() : 'Unknown';
                    const joinedDuration = formatJoinedDuration(user.created_at);
                    userDiv.innerHTML = `
                        <div class="grid md:grid-cols-2 gap-3">
                            <div>
                                <p><strong>Name:</strong> ${user.name || '-'}</p>
                                <p><strong>Email:</strong> ${user.email || '-'}</p>
                                <p><strong>Phone:</strong> ${user.phone || '-'}</p>
                                <p><strong>Status:</strong> ${user.status || '-'}</p>
                            </div>
                            <div>
                                <p><strong>Joined On:</strong> ${joinedOn}</p>
                                <p><strong>Member For:</strong> ${joinedDuration}</p>
                                <p><strong>Total Deposited:</strong> ${formatCurrency(user.total_deposited)}</p>
                                <p><strong>Approved Deposits:</strong> ${formatCurrency(user.approved_total_deposited)}</p>
                                <p><strong>Pending Deposits:</strong> ${formatCurrency(user.pending_total_deposited)}</p>
                                <p><strong>Deposit Count:</strong> ${Number(user.deposit_count || 0)}</p>
                            </div>
                        </div>
                    `;
                    list.appendChild(userDiv);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('users-overview-list').innerHTML = '<p class="text-red-500">Failed to load users overview. Please refresh this page (Ctrl+F5) and try again.</p>';
            });
        }

        // Load pending users
        function loadPendingUsers() {
            fetch('/api/pending')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('pending-list');
                list.innerHTML = '';

                const users = data.users || [];
                if (users.length === 0) {
                    list.innerHTML = '<p class="text-gray-500">No pending signups.</p>';
                    return;
                }

                users.forEach(user => {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'border p-4 rounded flex justify-between items-center';
                    userDiv.innerHTML = `
                        <div>
                            <p><strong>Name:</strong> ${user.name}</p>
                            <p><strong>Email:</strong> ${user.email}</p>
                            <p><strong>Phone:</strong> ${user.phone}</p>
                        </div>
                        <div>
                            <button onclick="approveUser(${user.id})" class="bg-blue-800 text-white px-4 py-2 rounded mr-2">Approve</button>
                            <button onclick="rejectUser(${user.id})" class="bg-red-600 text-white px-4 py-2 rounded">Reject</button>
                        </div>
                    `;
                    list.appendChild(userDiv);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('pending-list').innerHTML = '<p class="text-red-500">Failed to load pending users. Ensure server is running.</p>';
            });
        }

        function approveUser(id) {
            fetch(`/api/approve/${id}`, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('User approved!');
                    loadPendingUsers();
                } else {
                    alert('Error approving user');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Approval failed. Ensure server is running.');
            });
        }

        function rejectUser(id) {
            fetch(`/api/reject/${id}`, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('User rejected!');
                    loadPendingUsers();
                } else {
                    alert('Error rejecting user');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Rejection failed. Ensure server is running.');
            });
        }

        function loadPendingDeposits() {
            fetch('/api/admin/pending-deposits')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('pending-deposits-list');
                list.innerHTML = '';

                const deposits = data.deposits || [];
                if (deposits.length === 0) {
                    list.innerHTML = '<p class="text-gray-500">No pending deposits.</p>';
                    return;
                }

                deposits.forEach(deposit => {
                    const depositDiv = document.createElement('div');
                    depositDiv.className = 'border p-4 rounded flex justify-between items-center gap-4';
                    depositDiv.innerHTML = `
                        <div>
                            <p><strong>User:</strong> ${deposit.user_name} (${deposit.user_email})</p>
                            <p><strong>Plan:</strong> ${deposit.plan_name}</p>
                            <p><strong>Amount:</strong> GH₵ ${Number(deposit.amount || 0).toFixed(2)}</p>
                            <p><strong>Provider:</strong> ${deposit.payment_provider || 'Manual'}</p>
                            <p><strong>Mobile Number:</strong> ${deposit.mobile_number || '-'}</p>
                            <p><strong>Reference:</strong> ${deposit.payment_reference || '-'}</p>
                        </div>
                        <div class="shrink-0">
                            <button onclick="approveDeposit(${deposit.id})" class="bg-blue-800 text-white px-4 py-2 rounded mr-2">Approve</button>
                            <button onclick="rejectDeposit(${deposit.id})" class="bg-red-600 text-white px-4 py-2 rounded">Reject</button>
                        </div>
                    `;
                    list.appendChild(depositDiv);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('pending-deposits-list').innerHTML = '<p class="text-red-500">Failed to load pending deposits.</p>';
            });
        }

        function approveDeposit(id) {
            fetch(`/api/admin/approve-deposit/${id}`, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Deposit approved. Growth starts now.');
                    loadPendingDeposits();
                } else {
                    alert(data.message || 'Error approving deposit');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Approval failed. Ensure server is running.');
            });
        }

        function rejectDeposit(id) {
            fetch(`/api/admin/reject-deposit/${id}`, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Deposit rejected.');
                    loadPendingDeposits();
                } else {
                    alert(data.message || 'Error rejecting deposit');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Rejection failed. Ensure server is running.');
            });
        }

        // Load on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadUsersOverview();
            loadPendingUsers();
            loadPendingDeposits();
        });
    </script>
</body>
</html>
